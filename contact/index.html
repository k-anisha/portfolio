<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact</title>
    <link rel="stylesheet" href="../style.css">
    <script src="../global.js" type="module"></script>
</head>
<body>

  <h1>Contact</h1>

<form action="mailto:foo@gmail.com" method="POST" enctype="text/plain">

  <label>
    Email:
    <input type="email" name="email">
  </label>
  <br><br>

  <label>
    Subject:
    <input name="subject">
  </label>
  <br><br>

  <label>
    Message:
    <textarea name="body"></textarea>
  </label>
  <br><br>

  <button>Send</button>

</form>

</body>
</html>
